services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: fraud-lb:latest
    container_name: fraud-lb
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Lembre-se de atualizar o nginx.conf para usar os unix sockets!
      - rinha-sockets:/sockets
    networks:
      - fraud-network
    depends_on:
      - api01
      - api02
    sysctls:
      net.core.somaxconn: 4096 # Valor seguro que evita EINVAL em alguns kernels
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "30MB"
        reservations:
          cpus: "0.05"
          memory: "30MB"
    restart: unless-stopped

  api01:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: fraud-api-c:latest
    container_name: fraud-api-01
    networks:
      - fraud-network
    environment:
      - LISTEN_ON=unix:///sockets/api1.sock
      - MALLOC_ARENA_MAX=2 # Otimiza alocação de memória glibc[cite: 8, 12]
    cap_add:
      - IPC_LOCK # Permite que o C tranque memória na RAM[cite: 12]
    sysctls:
      net.core.somaxconn: 4096
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1 # Remove o limite para o mlock do references.bin funcionar[cite: 12]
        hard: -1
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"
        reservations:
          cpus: "0.475"
          memory: "160MB"
    volumes:
      - rinha-sockets:/sockets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 5s
      timeout: 2s
      retries: 3

  api02:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: fraud-api-c:latest
    container_name: fraud-api-02
    networks:
      - fraud-network
    environment:
      - LISTEN_ON=unix:///sockets/api2.sock
      - MALLOC_ARENA_MAX=2
    cap_add:
      - IPC_LOCK
    sysctls:
      net.core.somaxconn: 4096
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"
        reservations:
          cpus: "0.475"
          memory: "160MB"
    volumes:
      - rinha-sockets:/sockets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 5s
      timeout: 2s
      retries: 3

volumes:
  rinha-sockets:

networks:
  fraud-network:
    driver: bridge