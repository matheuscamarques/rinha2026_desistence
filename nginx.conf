user nginx;
# Apenas 1 worker para não canibalizar os 0.05 de CPU do container.
worker_processes 1; 
worker_rlimit_nofile 65535;
# Silêncio total: logs no /dev/null para economizar I/O.
error_log /dev/null emerg;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    
    # Evita que o Nginx escreva o body em arquivos temporários no disco.
    client_max_body_size 64k;
    client_body_buffer_size 64k;

    upstream fraud_api {
        # Mantém um pool de conexões abertas com o seu backend em C[cite: 6, 11].
        keepalive 1024;
        server unix:/sockets/api1.sock max_fails=10 fail_timeout=10s;
        server unix:/sockets/api2.sock max_fails=10 fail_timeout=10s;
    }

    server {
        listen 9999;
        server_name _;
        server_tokens off;

        location / {
            proxy_pass http://fraud_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Removidos os headers inúteis (Host, X-Real-IP) para economizar ciclos[cite: 6, 11].
            
            # Ativado para que o Nginx "engula" a resposta do C e libere o backend.
            proxy_buffering off;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;

            # Timeouts agressivos para acompanhar o limite do K6[cite: 11].
            proxy_connect_timeout 1s;
            proxy_send_timeout 2s;
            proxy_read_timeout 10s;
            
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        location /ready {
            proxy_pass http://fraud_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_send_timeout 1s;
            proxy_read_timeout 1s;
            access_log off;
        }
    }
}